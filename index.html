<!DOCTYPE html>
<html lang="pt-pt" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Master - Visibilidade Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#fffcf2', 
                            dark: '#0f172a',
                            primary: '#d97706', 
                            contrast: '#451a03', 
                            accent: '#f59e0b',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        /* RESET DE IMPRESSÃO */
        @media print {
            @page { size: landscape; margin: 0.5cm; }
            .no-print { display: none !important; }
            .mobile-view { display: none !important; }
            .desktop-view { display: block !important; }
            body { background: white !important; }
            .print-container { 
                box-shadow: none !important; 
                border: 1px solid #000 !important;
                width: 100% !important;
                border-radius: 0 !important;
            }
            table { width: 100% !important; table-layout: fixed !important; }
            th, td { border: 1px solid #000 !important; font-size: 8pt !important; padding: 1px !important; }
            .bg-brand-primary { background-color: #d97706 !important; -webkit-print-color-adjust: exact; }
            
            /* Ajuste de título na impressão */
            .school-title-input { font-size: 16pt !important; }
        }

        .editable-input {
            background: transparent;
            border: none;
            width: 100%;
            text-align: inherit;
            color: inherit;
        }
        
        .edit-mode .editable-input {
            background-color: rgba(217, 119, 6, 0.08);
            box-shadow: inset 0 -1px 0 #d97706;
        }

        /* Estilo para Mobile: Lista de Cartões */
        @media (max-width: 639px) {
            .desktop-view { display: none; }
            .mobile-view { display: block; }
            
            /* Fonte fluida para o título caber sempre */
            .school-title-input { 
                font-size: clamp(10px, 3.8vw, 16px) !important;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
        }
        @media (min-width: 640px) {
            .desktop-view { display: block; }
            .mobile-view { display: none; }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-brand-dark text-slate-900 dark:text-slate-100 transition-colors duration-300 min-h-screen">

    <!-- Navbar Compacta -->
    <nav class="sticky top-0 z-[100] bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 no-print">
        <div class="max-w-7xl mx-auto px-4 h-12 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 bg-brand-primary rounded flex items-center justify-center text-white shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>
                </div>
                <span class="font-black text-xs uppercase tracking-tighter sm:text-base">Grade<span class="text-brand-primary">Master</span></span>
            </div>

            <div class="flex items-center gap-1.5">
                <button id="themeToggle" class="p-1.5 rounded-md hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    <svg id="sunIcon" class="hidden dark:block w-4 h-4 text-yellow-400" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                    <svg id="moonIcon" class="block dark:hidden w-4 h-4 text-slate-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                </button>

                <button id="toggleEdit" class="flex items-center gap-1 px-2 py-1 rounded bg-slate-900 dark:bg-slate-700 text-white font-bold text-[9px] sm:text-xs hover:bg-brand-primary transition-colors shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                    <span id="editText">EDITAR</span>
                </button>

                <button onclick="window.print()" class="flex items-center gap-1 px-2 py-1 bg-brand-primary text-white rounded font-black text-[9px] sm:text-xs shadow-md shadow-brand-primary/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>
                    <span>PDF</span>
                </button>
            </div>
        </div>
    </nav>

    <main id="mainContainer" class="max-w-6xl mx-auto p-1.5 sm:p-4">
        
        <div class="bg-white dark:bg-slate-900 rounded-xl sm:rounded-3xl shadow-xl border border-slate-200 dark:border-slate-800 print-container overflow-hidden">
            
            <!-- Cabeçalho Otimizado -->
            <header class="p-3 sm:p-6 border-b border-slate-100 dark:border-slate-800 flex flex-col items-center gap-3">
                <div class="w-full flex justify-between text-[7px] sm:text-[9px] font-black text-slate-400 uppercase px-1">
                    <div class="flex gap-1 border-b border-brand-primary/20 pb-0.5">
                        <span>ANO:</span>
                        <input class="editable-input w-8 text-brand-primary font-black" data-key="academicYear" value="2026" readonly>
                    </div>
                    <div class="flex gap-1 border-b border-brand-primary/20 pb-0.5">
                        <span>DATA:</span>
                        <input id="currentDateInput" class="editable-input w-16 text-brand-primary font-black text-center" data-key="currentDate" value="" readonly>
                    </div>
                </div>

                <!-- Título Escolar com Fonte Inteligente -->
                <div class="w-full max-w-full overflow-hidden text-center">
                    <h2 class="school-title-input font-black text-slate-900 dark:text-white uppercase leading-tight sm:text-2xl">
                        <input class="editable-input text-center w-full" data-key="schoolName" value="E.E. PROFA. JUVENÍLIA FERREIRA DO AMARAL" readonly>
                    </h2>
                </div>

                <!-- Staff Grid Ultra-Compacta -->
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-1 sm:gap-4 w-full pt-1">
                    <div class="text-center p-1 rounded bg-slate-50 dark:bg-slate-800/40 border border-slate-100 dark:border-slate-700">
                        <p class="text-[6px] sm:text-[8px] font-extrabold text-slate-400 leading-none mb-0.5">DIR.</p>
                        <input class="editable-input text-[8px] sm:text-[10px] font-black text-brand-contrast dark:text-slate-200" data-key="staff1" value="LUIZ ANTÔNIO DE SOUZA" readonly>
                    </div>
                    <div class="text-center p-1 rounded bg-slate-50 dark:bg-slate-800/40 border border-slate-100 dark:border-slate-700">
                        <p class="text-[6px] sm:text-[8px] font-extrabold text-slate-400 leading-none mb-0.5">VICE</p>
                        <input class="editable-input text-[8px] sm:text-[10px] font-black text-brand-contrast dark:text-slate-200" data-key="staff2" value="TÚLIO SIQUEIRA" readonly>
                    </div>
                    <div class="text-center p-1 rounded bg-slate-50 dark:bg-slate-800/40 border border-slate-100 dark:border-slate-700">
                        <p class="text-[6px] sm:text-[8px] font-extrabold text-slate-400 leading-none mb-0.5">SUP.</p>
                        <input class="editable-input text-[8px] sm:text-[10px] font-black text-brand-contrast dark:text-slate-200" data-key="staff3" value="J. CATALUNHA" readonly>
                    </div>
                    <div class="text-center p-1 rounded bg-slate-50 dark:bg-slate-800/40 border border-slate-100 dark:border-slate-700">
                        <p class="text-[6px] sm:text-[8px] font-extrabold text-slate-400 leading-none mb-0.5">COORD.</p>
                        <input class="editable-input text-[8px] sm:text-[10px] font-black text-brand-contrast dark:text-slate-200" data-key="staff4" value="G. MARTINS" readonly>
                    </div>
                </div>
            </header>

            <!-- VIEW 1: TABELA DESKTOP / PRINT -->
            <div class="desktop-view w-full overflow-hidden">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="bg-slate-100 dark:bg-slate-800 text-slate-500 text-[8px] sm:text-[10px] font-black uppercase border-b border-slate-200 dark:border-slate-700">
                            <th class="p-2 w-24 sm:w-32 border-r border-slate-200 dark:border-slate-700">Horário</th>
                            <th class="p-2 border-r border-slate-200 dark:border-slate-700">SEG</th>
                            <th class="p-2 border-r border-slate-200 dark:border-slate-700">TER</th>
                            <th class="p-2 border-r border-slate-200 dark:border-slate-700">QUA</th>
                            <th class="p-2 border-r border-slate-200 dark:border-slate-700">QUI</th>
                            <th class="p-2">SEX</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Gerado via Script -->
                    </tbody>
                </table>
            </div>

            <!-- VIEW 2: CARDS MOBILE (Sem Scroll Lateral) -->
            <div class="mobile-view w-full p-2 space-y-3">
                <div id="mobileCardsContainer">
                    <!-- Gerado via Script -->
                </div>
            </div>

            <!-- Footer -->
            <footer class="p-4 border-t border-slate-100 dark:border-slate-800 flex flex-col items-center gap-2 bg-slate-50/50 dark:bg-slate-800/20">
                <div class="w-24 h-0.5 bg-brand-primary/30 mb-1"></div>
                <span class="text-[7px] sm:text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none">Validação Administrativa Académica</span>
            </footer>
        </div>
    </main>

    <script>
        const tableBody = document.getElementById('tableBody');
        const mobileContainer = document.getElementById('mobileCardsContainer');
        const days = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta'];
        
        const scheduleData = [
            { time: '19:10', type: 'entry' },
            { time: '1º Horário', classes: [['Soluções Mat.', 'Vilson'], ['Português', 'Elza'], ['Intervenção Cidadã', 'Marcelo'], ['Química', 'Pollyana'], ['Biologia', 'Ranner']] },
            { time: '2º Horário', classes: [['História', 'Geane'], ['Arte', 'Cristino'], ['Português', 'Elza'], ['Matemática', 'Crislaine'], ['Física', 'Daniel']] },
            { time: 'Recreio', type: 'break' },
            { time: '3º Horário', classes: [['Matemática', 'Crislaine'], ['Geografia', 'Marcelo'], ['Sociologia', 'Fabiola'], ['Português', 'Elza'], ['Matemática', 'Crislaine']] },
            { time: '4º Horário', classes: [['Português', 'Elza'], ['Matemática', 'Crislaine'], ['Filosofia', 'José'], ['Biologia', 'Ranner'], ['Inglês', 'Ana Paula']] }
        ];

        function renderTable() {
            let html = '';
            scheduleData.forEach((row, rIdx) => {
                if(row.type === 'entry') {
                    html += `<tr class="border-b dark:border-slate-800">
                        <td class="p-2 bg-slate-50/50 dark:bg-slate-900 font-black text-center text-[9px] text-brand-primary border-r border-slate-200 dark:border-slate-700">${row.time}</td>
                        <td colspan="5" class="text-center text-[7px] font-black tracking-[1.5em] text-slate-200 dark:text-slate-800">ENTRADA</td>
                    </tr>`;
                } else if(row.type === 'break') {
                    html += `<tr class="bg-brand-primary/5 border-b dark:border-slate-800">
                        <td class="p-2 font-black text-center text-[9px] text-brand-primary border-r border-slate-200 dark:border-slate-700">${row.time}</td>
                        <td colspan="5" class="text-center text-[7px] font-black tracking-[1em] text-brand-primary/40 italic uppercase">Intervalo</td>
                    </tr>`;
                } else {
                    html += `<tr class="border-b dark:border-slate-800">
                        <td class="p-2 bg-slate-50/50 dark:bg-slate-900 font-black text-center text-[9px] text-slate-400 border-r border-slate-200 dark:border-slate-700 uppercase">${row.time}</td>
                        ${row.classes.map((c, cIdx) => `
                            <td class="p-1.5 border-r border-slate-200 dark:border-slate-700 text-center">
                                <input class="editable-input font-bold text-[9px] sm:text-[10px] dark:text-white" data-key="r${rIdx}c${cIdx}s" value="${c[0]}" readonly>
                                <div class="bg-slate-800 dark:bg-slate-100 text-white dark:text-black text-[6px] sm:text-[7px] font-bold px-1 rounded inline-block mt-0.5">
                                    <input class="editable-input w-auto text-center" data-key="r${rIdx}c${cIdx}p" value="${c[1]}" readonly>
                                </div>
                            </td>
                        `).join('')}
                    </tr>`;
                }
            });
            tableBody.innerHTML = html;
        }

        function renderMobile() {
            let html = '';
            days.forEach((day, dIdx) => {
                html += `
                <div class="bg-white dark:bg-slate-800 rounded-lg shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden mb-2">
                    <div class="bg-brand-primary py-1.5 text-white font-black text-[9px] uppercase tracking-widest text-center">${day}</div>
                    <div class="p-2 space-y-2">
                        ${scheduleData.filter(d => !d.type).map((row, rIdx) => `
                            <div class="flex items-center gap-2 border-b dark:border-slate-700 pb-1.5 last:border-0 last:pb-0">
                                <span class="text-[7px] font-black text-slate-400 w-10 shrink-0 border-r border-slate-100 dark:border-slate-700">${row.time}</span>
                                <div class="flex-1 pl-1">
                                    <input class="editable-input font-black text-[10px] block leading-tight" data-key="r${rIdx+1}c${dIdx}s" value="${row.classes[dIdx][0]}" readonly>
                                    <span class="text-[8px] font-bold text-brand-primary uppercase leading-none">
                                        <input class="editable-input inline w-auto" data-key="r${rIdx+1}c${dIdx}p" value="${row.classes[dIdx][1]}" readonly>
                                    </span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            });
            mobileContainer.innerHTML = html;
        }

        const htmlTag = document.documentElement;
        const toggleBtn = document.getElementById('toggleEdit');
        const editText = document.getElementById('editText');
        const dateInput = document.getElementById('currentDateInput');
        let isEditing = false;

        if (localStorage.theme === 'dark') htmlTag.classList.add('dark');

        document.getElementById('themeToggle').addEventListener('click', () => {
            htmlTag.classList.toggle('dark');
            localStorage.theme = htmlTag.classList.contains('dark') ? 'dark' : 'light';
        });

        function syncInputs(key, value) {
            document.querySelectorAll(`[data-key="${key}"]`).forEach(el => el.value = value);
        }

        toggleBtn.addEventListener('click', () => {
            isEditing = !isEditing;
            document.getElementById('mainContainer').classList.toggle('edit-mode');
            document.querySelectorAll('.editable-input').forEach(i => i.readOnly = !isEditing);
            
            if (isEditing) {
                editText.textContent = "CONCLUIR";
                toggleBtn.classList.replace('bg-slate-900', 'bg-brand-primary');
            } else {
                editText.textContent = "EDITAR";
                toggleBtn.classList.replace('bg-brand-primary', 'bg-slate-900');
                saveToLocal();
            }
        });

        function saveToLocal() {
            const data = {};
            document.querySelectorAll('.editable-input').forEach(i => {
                const key = i.getAttribute('data-key');
                if(key) data[key] = i.value;
            });
            localStorage.setItem('grade_responsive_final', JSON.stringify(data));
        }

        function loadFromLocal() {
            const saved = localStorage.getItem('grade_responsive_final');
            if (saved) {
                const data = JSON.parse(saved);
                Object.keys(data).forEach(key => syncInputs(key, data[key]));
            } else {
                dateInput.value = new Date().toLocaleDateString('pt-PT');
            }
        }

        document.addEventListener('input', (e) => {
            if (e.target.classList.contains('editable-input')) {
                const key = e.target.getAttribute('data-key');
                syncInputs(key, e.target.value);
            }
        });

        renderTable();
        renderMobile();
        loadFromLocal();
    </script>
</body>
</html>
